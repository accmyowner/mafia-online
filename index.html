<!DOCTYPE html>
<html lang="ru" data-theme="midnight">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0f1e" />
<meta name="description" content="Мафия Online — браузерная игра в мафию на Firebase" />
<meta name="color-scheme" content="dark" />
<title>Мафия Online</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@500;700;900&family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

<link rel="preload" as="image" href="./assets/img/city-mid.svg" />

<link rel="stylesheet" href="./styles/base.css" />
<link rel="stylesheet" href="./styles/layout.css" />
<link rel="stylesheet" href="./styles/components.css" />
<link rel="stylesheet" href="./styles/screens.css" />
<link rel="stylesheet" href="./styles/animations.css" />
</head>
<body>
  <!--
    Фон: семь слоёв ночного города. Порядок снизу вверх —
    небо, сияние, звёзды, три плана застройки, туман, окна, виньетка.
    Слои двигает src/ui/atmosphere.js.
  -->
  <div class="atmosphere" aria-hidden="true">
    <div class="atmosphere__sky"    data-depth="0"></div>
    <div class="atmosphere__aurora"></div>
    <div class="atmosphere__stars"  data-depth="6"></div>
    <div class="atmosphere__city atmosphere__city--far" data-depth="10"></div>
    <div class="atmosphere__city atmosphere__city--mid" data-depth="18"></div>
    <div class="atmosphere__fog atmosphere__fog--back"></div>
    <div class="atmosphere__city atmosphere__city--near" data-depth="30"></div>
    <div class="atmosphere__glow"  data-depth="14"></div>
    <div class="atmosphere__fog atmosphere__fog--front"></div>
    <div class="atmosphere__grid"  data-depth="22"></div>
    <div class="atmosphere__vignette"></div>
  </div>

  <!-- Полоса времени текущей фазы -->
  <div id="phase-bar" class="phase-bar" aria-hidden="true"></div>

  <!-- Точка монтирования экранов (см. src/core/router.js) -->
  <main id="app" class="app" role="main"></main>

  <!-- Нижняя панель: подключение, версия, игроки, ссылки -->
  <footer id="statusbar" class="statusbar"></footer>

  <!-- Слои поверх интерфейса -->
  <div id="modal-root" class="modal-root"></div>
  <div id="toast-root" class="toast-root" role="status" aria-live="polite"></div>

  <script type="module" src="./src/main.js"></script>
  <noscript>Для игры нужен включённый JavaScript.</noscript>
</body>
</html>
